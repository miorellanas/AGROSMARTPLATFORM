<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>

        Login AGROSMART

    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>

<body class="bg-light">

    <div class="container mt-5">

        <div class="row justify-content-center">

            <div class="col-md-4">

                <div class="card shadow">

                    <div class="card-body">

                        <h2 class="mb-4 text-center">

                            Login

                        </h2>

                        <form id="login-form">

                            <div class="mb-3">

                                <label>

                                    Email

                                </label>

                                <input
                                    type="email"
                                    class="form-control"
                                    id="email"
                                    required
                                >

                            </div>

                            <div class="mb-3">

                                <label>

                                    Contraseña

                                </label>

                                <input
                                    type="password"
                                    class="form-control"
                                    id="password"
                                    required
                                >

                            </div>

                            <button
                                type="submit"
                                class="btn btn-success w-100"
                            >

                                Ingresar

                            </button>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script>

        const formulario =

            document.getElementById(

                "login-form"

            )


        formulario.addEventListener(

            "submit",

            async function(e){

                e.preventDefault()


                const email =

                    document.getElementById(

                        "email"

                    ).value


                const password =

                    document.getElementById(

                        "password"

                    ).value


                const response =

                    await fetch(

                        "http://127.0.0.1:5000/iniciar_sesion",

                        {

                            method:"POST",

                            headers:{

                                "Content-Type":

                                "application/json"

                            },

                            body:JSON.stringify({

                                email,
                                password

                            })

                        }

                    )


                const data =

                    await response.json()


                if(data.success){

                    window.location.href =

                        data.redirect

                }

                else{

                    alert(

                        data.message

                    )

                }

            }

        )

    </script>

</body>

</html>
