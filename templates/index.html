<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>AGROSMART</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/styles.css') }}">

</head>

<body>

<nav class="navbar navbar-dark bg-success">

    <div class="container-fluid">

        <span class="navbar-brand mb-0 h1">
            🌱 AGROSMART
        </span>

    </div>

</nav>

<div class="container-fluid mt-4">

    <div class="row">

        <!-- PRODUCTOS -->

        <div class="col-md-9">

            <div class="row" id="productos-container">

            </div>

        </div>

        <!-- SIDEBAR CARRITO -->

        <div class="col-md-3">

            <div class="card shadow sticky-top">

                <div class="card-body">

                    <h3 class="mb-4">
                        🛒 Carrito
                    </h3>

                    <div id="carrito-container">

                        <p>
                            Carrito vacío
                        </p>

                    </div>

                    <hr>

                    <h5>
                        Subtotal:
                    </h5>

                    <h4 class="text-success">

                        CLP $
                        <span id="subtotal">
                            0
                        </span>

                    </h4>

                    <a
                        href="/checkout"
                        class="btn btn-success w-100 mt-3">

                        Ir a pagar

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

<script
    src="{{ url_for('static', filename='js/app.js') }}">
</script>

</body>

</html>
