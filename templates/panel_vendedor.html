<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>

        Panel Vendedor

    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-success">

        <div class="container-fluid">

            <span class="navbar-brand">

                🌱 AGROSMART
                | PANEL VENDEDOR

            </span>

            <div>

                <span class="text-white me-3">

                    {{ usuario.nombre }}

                </span>

                <a
                    href="/logout"
                    class="btn btn-light btn-sm"
                >

                    Cerrar sesión

                </a>

            </div>

        </div>

    </nav>

    <div class="container mt-5">

        <div class="card shadow">

            <div class="card-body">

                <h2>

                    Bienvenido vendedor

                </h2>

                <hr>

                <p>

                    Desde aquí podrás:

                </p>

                <ul>

                    <li>

                        Generar ventas

                    </li>

                    <li>

                        Crear pedidos manuales

                    </li>

                    <li>

                        Gestionar clientes

                    </li>

                </ul>

                <a
                    href="/tienda"
                    class="btn btn-success"
                >

                    Ir a tienda

                </a>

            </div>

        </div>

    </div>

</body>

</html>
