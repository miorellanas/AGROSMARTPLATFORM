<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">

    <title>Checkout AGROSMART</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
</head>

<body class="bg-light">

    <div class="container mt-5">

        <div class="card shadow">

            <div class="card-body">

                <h2 class="mb-4">
                    Finalizar compra
                </h2>

                <form id="checkout-form">

                    <div class="mb-3">

                        <label class="form-label">
                            Nombre
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            id="nombre"
                            required
                        >

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Email
                        </label>

                        <input
                            type="email"
                            class="form-control"
                            id="email"
                            required
                        >

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Teléfono
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            id="telefono"
                            required
                        >

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Región
                        </label>

                        <select
                            class="form-select"
                            id="region"
                            required
                        >

                            <option value="">
                                Seleccione región
                            </option>

                            <option value="1">
                                Metropolitana
                            </option>

                            <option value="2">
                                O Higgins
                            </option>

                            <option value="3">
                                Maule
                            </option>

                            <option value="4">
                                Ñuble
                            </option>

                            <option value="5">
                                Biobío
                            </option>

                        </select>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Comuna
                        </label>

                        <select
                            class="form-select"
                            id="comuna"
                            required
                        >

                            <option value="">
                                Seleccione comuna
                            </option>

                            <option value="101">
                                Santiago
                            </option>

                            <option value="102">
                                Puente Alto
                            </option>

                            <option value="201">
                                Rancagua
                            </option>

                            <option value="301">
                                Talca
                            </option>

                            <option value="401">
                                Chillán
                            </option>

                            <option value="501">
                                Concepción
                            </option>

                        </select>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Calle
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            id="calle"
                            required
                        >

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Número
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            id="numero"
                            required
                        >

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Referencia
                        </label>

                        <textarea
                            class="form-control"
                            id="referencia"
                            rows="3"
                        ></textarea>

                    </div>

                    <button
                        type="submit"
                        class="btn btn-success w-100"
                    >
                        Continuar al pago
                    </button>

                </form>

            </div>

            <div class="col-md-4">

                <div
                    class="card shadow sticky-top"
                    style="top:20px"
                >

                    <div class="card-body">

                        <h4>

                            Resumen del pedido

                        </h4>

                        <hr>

                        <div id="carrito-container">

                        </div>

                        <hr>

                        <h5>

                            Subtotal:

                            CLP $

                            <span id="subtotal">

                                0

                            </span>

                        </h5>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script>

        const formularioCheckout =
            document.getElementById(
                "checkout-form"
            )


        formularioCheckout.addEventListener(

            "submit",

            async function(e){

                e.preventDefault()

                const carrito =
                    JSON.parse(
                        localStorage.getItem(
                            "carrito"
                        )
                    ) || []


                if(carrito.length===0){

                    alert(
                        "El carrito está vacío"
                    )

                    return

                }


                const cliente = {

                    nombre:
                        document.getElementById(
                            "nombre"
                        ).value,

                    email:
                        document.getElementById(
                            "email"
                        ).value,

                    telefono:
                        document.getElementById(
                            "telefono"
                        ).value,

                    calle:
                        document.getElementById(
                            "calle"
                        ).value,

                    numero:
                        document.getElementById(
                            "numero"
                        ).value,

                    comuna:
                        document.getElementById(
                            "comuna"
                        ).value,

                    referencia:
                        document.getElementById(
                            "referencia"
                        ).value

                }


                try{

                    const response =
                        await fetch(

                            "http://127.0.0.1:5000/crear_pedido",

                            {

                                method:"POST",

                                headers:{

                                    "Content-Type":
                                    "application/json"

                                },

                                body:JSON.stringify({

                                    cliente:cliente,
                                    carrito:carrito

                                })

                            }

                        )


                    const data =
                        await response.json()

                    console.log(data)


                    if(data.tipo === "venta_vendedor"){

                        alert(

                            "Venta generada correctamente"

                        )

                        localStorage.removeItem(
                            "carrito"
                        )

                        window.location.href =
                            "/panel/vendedor"

                    }

                    else if(data.token){

                        localStorage.removeItem(
                            "carrito"
                        )

                        window.location.href =

                            data.url +

                            "?token_ws=" +

                            data.token

                    }

                    else{

                        alert(
                            "Error iniciando pago"
                        )

                    }

                }

                catch(error){

                    console.log(error)

                    alert(
                        "Error de conexión"
                    )

                }

            }

        )

    </script>
</body>

</html>
